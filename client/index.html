<!DOCTYPE html>
<html>
<head>
    <title>TESTE - Smart Trade</title>
    <style>
        body {
            background: #0A0E17;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .teste {
            background: #1DB954;
            color: #0A0E17;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 0 50px rgba(29, 185, 84, 0.5);
        }
        .teste span {
            display: block;
            font-size: 20px;
            color: #0A0E17;
            margin-top: 10px;
            opacity: 0.7;
        }
        .info {
            color: #5E7390;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
        .info a {
            color: #1DB954;
        }
    </style>
</head>
<body>
    <div>
        <div class="teste">
            🟢 FUNCIONOU!
            <span>O servidor está servindo este arquivo</span>
        </div>
        <div class="info">
            <p>Se você está vendo isso, o <strong>index.html</strong> foi atualizado!</p>
            <p>📡 API: <a href="/api/status" target="_blank">/api/status</a></p>
            <p>📊 Dados: <a href="/api/dados" target="_blank">/api/dados</a></p>
            <p style="font-size:12px;margin-top:10px;">Data/hora: <span id="hora"></span></p>
        </div>
    </div>

    <script>
        // Mostra a hora atual
        document.getElementById('hora').textContent = new Date().toLocaleString('pt-BR');
    </script>
</body>
</html>
